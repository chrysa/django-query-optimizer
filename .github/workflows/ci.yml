---
name: CI

on:
    pull_request:
        branches: [main]
    push:
        branches:
            - main
            - "feat/**"
            - "fix/**"
            - "chore/**"
            - "ci/**"
    workflow_dispatch:

permissions:
    checks: write
    contents: read
    pull-requests: write
    statuses: write

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    pre-commit:
        name: Pre-commit checks
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - uses: actions/checkout@v7.0.0

            - uses: chrysa/github-actions/python-setup@v1.2.1
              with:
                  python-version: "3.14"
                  cache: pip

            - uses: pre-commit/action@v3.0.1
              env:
                  SKIP: no-commit-to-branch

    lint:
        name: Ruff + Mypy
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - uses: actions/checkout@v7.0.0

            - name: Setup environment
              uses: chrysa/github-actions/tool-setup@v1.2.1
              with:
                  python-version: "3.14"
                  extras: "dev,postgres,drf"

            - name: Ruff checks
              uses: chrysa/github-actions/ruff-check@v1.2.1
              with:
                  python-version: "3.14"
                  latest-python: "3.14"
                  sources: "src/django_query_optimizer tests"

            - name: Mypy checks
              uses: chrysa/github-actions/mypy-check@v1.2.1
              with:
                  python-version: "3.14"
                  latest-python: "3.14"
                  config-file: "pyproject.toml"
                  sources: "src/django_query_optimizer"

    test:
        name: Docker tests
        needs: lint
        runs-on: ubuntu-latest
        timeout-minutes: 20
        steps:
            - uses: actions/checkout@v7.0.0

            - name: Run tests via Docker
              run: make docker-test

            # Coverage is generated in the test job; the sonar job runs on a
            # separate runner, so the report must travel as an artifact named
            # test-results-<python-version> (what sonar-scan-python downloads).
            - name: Upload coverage report
              if: always()
              uses: actions/upload-artifact@v7
              with:
                  name: test-results-3.14
                  path: coverage.xml
                  if-no-files-found: warn

    sarif:
        name: Upload SARIF to GitHub Code Scanning
        needs: test
        runs-on: ubuntu-latest
        timeout-minutes: 10
        permissions:
            contents: read
            security-events: write
        steps:
            - uses: actions/checkout@v7.0.0

            - name: Setup environment
              uses: chrysa/github-actions/tool-setup@v1.2.1
              with:
                  python-version: "3.14"
                  extras: "dev,postgres,drf"

            - name: Generate SARIF report
              run: |
                  python - << 'EOF'
                  import json, pathlib
                  from django_query_optimizer.analyzers.query_analyzer import QueryAnalyzer
                  from django_query_optimizer.reporting.sarif import SARIFReporter

                  # Empty run — generates a valid SARIF with zero results for upload
                  reporter = SARIFReporter(QueryAnalyzer([]).analyze())
                  pathlib.Path("query-results.sarif").write_text(reporter.as_json())
                  print("SARIF generated")
                  EOF
              env:
                  DJANGO_SETTINGS_MODULE: tests.settings

            - name: Upload SARIF to GitHub Code Scanning
              uses: github/codeql-action/upload-sarif@v4
              with:
                  sarif_file: query-results.sarif
                  category: django-query-optimizer

    sonar:
        name: SonarCloud
        if: ${{ github.actor != 'dependabot[bot]' }}
        needs: test
        runs-on: ubuntu-latest
        timeout-minutes: 15
        permissions:
            contents: read
            pull-requests: read
        steps:
            - uses: actions/checkout@v7.0.0
              with:
                  fetch-depth: 0

            - uses: chrysa/github-actions/sonar-scan-python@v1.2.1
              with:
                  python-version: "3.14"
                  sonar-token: ${{ secrets.SONAR_TOKEN }}
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  project-key: chrysa_django-query-optimizer
                  organization: chrysa
                  project-name: django-query-optimizer
                  sources: src
                  tests: tests
                  # Downloaded from the test-results-3.14 artifact into reports/.
                  coverage-report: reports/coverage.xml
