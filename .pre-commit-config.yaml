---
repos:
    - repo: https://github.com/pre-commit/pre-commit-hooks
      rev: v6.0.0
      hooks:
          - id: trailing-whitespace
          - id: end-of-file-fixer
          - id: check-yaml
          - id: check-toml
          - id: check-merge-conflict
          - id: detect-private-key

          - id: check-json
          - args:
                - --branch
                - main
            id: no-commit-to-branch
    - repo: https://github.com/astral-sh/ruff-pre-commit
      rev: v0.15.16
      hooks:
          - id: ruff
            args: [--fix]
          - id: ruff-format

    - repo: https://github.com/pre-commit/mirrors-mypy
      rev: v2.1.0
      hooks:
          - id: mypy
            files: ^src/
            exclude: ^src/django_query_optimizer/testing/
            additional_dependencies: [django-stubs, djangorestframework-stubs, django]
            args: [--config-file, pyproject.toml]

    - repo: https://github.com/chrysa/pre-commit-tools
      rev: v0.1.1-94
      hooks:
          - id: makefile-check
          - id: adr-gate
          - id: python-print-detection
          - id: python-pprint-detection
          - id: no-bare-except
          - id: python-logger-detection
          - id: no-sync-in-async
          - id: debugger-detection
          - id: dockerfile-no-latest
          - id: regression-gate
            stages: [pre-push]
          - exclude: ^(\.github/|workflows/|templates/)
            id: yaml-sorter
          - id: json-sorter
          - id: env-file-check
          - id: env-example-sync
          - id: python-unreachable-code
          - id: no-hardcoded-localhost
            exclude: 'tests?/|\.test\.|\.spec\.'

    - repo: https://github.com/compilerla/conventional-pre-commit
      rev: v4.4.0
      hooks:
          - id: conventional-pre-commit
            stages: [commit-msg]
            args: [feat, fix, docs, style, refactor, test, chore, perf, revert, ci]
    - repo: https://github.com/igorshubovych/markdownlint-cli
      rev: v0.48.0
      hooks:
          - args:
                - --fix
            id: markdownlint
            stages:
                - manual
    - repo: https://github.com/gitleaks/gitleaks
      rev: v8.30.1
      hooks:
          - id: gitleaks
