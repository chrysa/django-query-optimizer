name: django-query-optimizer
services:
  lint:
    build:
      context: .
      dockerfile: Dockerfile
      target: lint
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1

  test:
    build:
      context: .
      dockerfile: Dockerfile
      target: test
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    volumes:
      # Surface coverage.xml on the host so CI can upload it to SonarCloud.
      - ./coverage.xml:/app/coverage.xml
